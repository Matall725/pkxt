<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" font-family="'Segoe UI',system-ui,-apple-system,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f4ff"/>
      <stop offset="100%" stop-color="#e8eeff"/>
    </linearGradient>
    <linearGradient id="gBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="gPurple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="gGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="gOrange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="gPink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#1e3a5f" flood-opacity="0.10"/>
    </filter>
    <filter id="shadowLg" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#1e3a5f" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <polygon points="0,0 10,3.5 0,7" fill="#94a3b8"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <polygon points="0,0 10,3.5 0,7" fill="#3b82f6"/>
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <polygon points="0,0 10,3.5 0,7" fill="#8b5cf6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="720" rx="16" fill="url(#bg)"/>

  <!-- Title Bar -->
  <rect x="0" y="0" width="1100" height="56" rx="16" fill="#1e293b"/>
  <rect x="0" y="28" width="1100" height="28" fill="#1e293b"/>
  <circle cx="28" cy="28" r="7" fill="#ef4444"/>
  <circle cx="50" cy="28" r="7" fill="#f59e0b"/>
  <circle cx="72" cy="28" r="7" fill="#10b981"/>
  <text x="550" y="34" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="700" letter-spacing="1">PKXT  AI Copilot  &amp;  Agent  Architecture</text>

  <!-- ═══════════════════ MAIN FLOW (Left) ═══════════════════ -->

  <!-- ── Layer 1: Web UI ── -->
  <rect x="40" y="80" width="680" height="70" rx="12" fill="white" filter="url(#shadow)"/>
  <rect x="40" y="80" width="5" height="70" rx="2" fill="url(#gBlue)"/>
  <text x="66" y="104" fill="#1e293b" font-size="14" font-weight="700">Web UI Layer</text>
  <text x="66" y="122" fill="#64748b" font-size="11">Bootstrap 5  |  HTMX  |  Server-Sent Events (SSE)</text>

  <!-- UI sub-items -->
  <rect x="430" y="88" width="130" height="24" rx="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="495" y="105" text-anchor="middle" fill="#2563eb" font-size="10" font-weight="600">AI Chat Drawer</text>
  <rect x="570" y="88" width="66" height="24" rx="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="603" y="105" text-anchor="middle" fill="#2563eb" font-size="10" font-weight="600">HTMX</text>
  <rect x="646" y="88" width="50" height="24" rx="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="671" y="105" text-anchor="middle" fill="#2563eb" font-size="10" font-weight="600">SSE</text>

  <!-- Arrow down -->
  <line x1="380" y1="150" x2="380" y2="180" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="394" y="170" fill="#94a3b8" font-size="9">JSON / SSE</text>

  <!-- ── Layer 2: Django Views ── -->
  <rect x="40" y="184" width="680" height="70" rx="12" fill="white" filter="url(#shadow)"/>
  <rect x="40" y="184" width="5" height="70" rx="2" fill="url(#gPurple)"/>
  <text x="66" y="208" fill="#1e293b" font-size="14" font-weight="700">Django Views / APIs</text>
  <text x="66" y="226" fill="#64748b" font-size="11">StreamingHttpResponse  |  @login_required  |  @require_POST</text>

  <!-- View badges -->
  <rect x="530" y="192" width="82" height="22" rx="11" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1"/>
  <text x="571" y="207" text-anchor="middle" fill="#7c3aed" font-size="9" font-weight="600">Copilot SSE</text>
  <rect x="618" y="192" width="46" height="22" rx="11" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1"/>
  <text x="641" y="207" text-anchor="middle" fill="#7c3aed" font-size="9" font-weight="600">Approve</text>
  <rect x="670" y="192" width="34" height="22" rx="11" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1"/>
  <text x="687" y="207" text-anchor="middle" fill="#7c3aed" font-size="9" font-weight="600">Reject</text>

  <!-- Arrow down -->
  <line x1="380" y1="254" x2="380" y2="284" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="394" y="274" fill="#94a3b8" font-size="9">invoke</text>

  <!-- ═══════════════════ AI GATEWAY (Main Box) ═══════════════════ -->
  <rect x="40" y="288" width="680" height="260" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5" filter="url(#shadowLg)"/>
  <rect x="40" y="288" width="680" height="34" rx="14" fill="#312e81"/>
  <rect x="40" y="308" width="680" height="14" fill="#312e81"/>
  <text x="66" y="311" fill="#e0e7ff" font-size="13" font-weight="700" letter-spacing="0.5">ai_gateway  App</text>

  <!-- Row 1: Client -> Prompt Cache -> Pydantic -->
  <rect x="60" y="338" width="186" height="58" rx="10" fill="#f0f9ff" stroke="#7dd3fc" stroke-width="1"/>
  <text x="153" y="360" text-anchor="middle" fill="#0369a1" font-size="11" font-weight="700">RobustAnthropicClient</text>
  <text x="153" y="378" text-anchor="middle" fill="#64748b" font-size="9">Tenacity Retry  |  Exponential Backoff</text>

  <line x1="246" y1="367" x2="274" y2="367" stroke="#7dd3fc" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <rect x="278" y="338" width="186" height="58" rx="10" fill="#fdf4ff" stroke="#d8b4fe" stroke-width="1"/>
  <text x="371" y="360" text-anchor="middle" fill="#7e22ce" font-size="11" font-weight="700">Prompt Cache Manager</text>
  <text x="371" y="378" text-anchor="middle" fill="#64748b" font-size="9">Static System Prompts  |  Tools</text>

  <line x1="464" y1="367" x2="492" y2="367" stroke="#d8b4fe" stroke-width="1.5" marker-end="url(#arrowPurple)"/>

  <rect x="496" y="338" width="200" height="58" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="596" y="360" text-anchor="middle" fill="#15803d" font-size="11" font-weight="700">Pydantic Validator</text>
  <text x="596" y="378" text-anchor="middle" fill="#64748b" font-size="9">Structured Outputs  |  Schema Enforce</text>

  <!-- Row 2: Agent Tools -> Audit Log -> Token Cost -->
  <rect x="60" y="410" width="186" height="58" rx="10" fill="#fff7ed" stroke="#fdba74" stroke-width="1"/>
  <text x="153" y="432" text-anchor="middle" fill="#c2410c" font-size="11" font-weight="700">Agent Tool Executor</text>
  <text x="153" y="450" text-anchor="middle" fill="#64748b" font-size="9">lookup  |  conflicts  |  history</text>

  <line x1="246" y1="439" x2="274" y2="439" stroke="#fdba74" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="278" y="410" width="186" height="58" rx="10" fill="#fdf2f8" stroke="#f9a8d4" stroke-width="1"/>
  <text x="371" y="432" text-anchor="middle" fill="#be185d" font-size="11" font-weight="700">AIAuditLog</text>
  <text x="371" y="450" text-anchor="middle" fill="#64748b" font-size="9">Trace-ID  |  Latency  |  Tokens</text>

  <line x1="464" y1="439" x2="492" y2="439" stroke="#f9a8d4" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="496" y="410" width="200" height="58" rx="10" fill="#fefce8" stroke="#fde047" stroke-width="1"/>
  <text x="596" y="432" text-anchor="middle" fill="#a16207" font-size="11" font-weight="700">Token Cost Tracker</text>
  <text x="596" y="450" text-anchor="middle" fill="#64748b" font-size="9">Cache Hit/Miss  |  USD Calculation</text>

  <!-- Agent Loop indicator -->
  <rect x="60" y="482" width="636" height="50" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="378" y="500" text-anchor="middle" fill="#475569" font-size="11" font-weight="600">Agent Loop (max 5 turns)</text>
  <text x="378" y="518" text-anchor="middle" fill="#94a3b8" font-size="10">Call LLM  ->  Tool Use?  ->  Execute Tool  ->  Feed Result  ->  Call LLM again  ->  Text Output  ->  SSE Stream</text>

  <!-- Arrow down from AI Gateway -->
  <line x1="380" y1="548" x2="380" y2="576" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="394" y="567" fill="#94a3b8" font-size="9">ORM</text>

  <!-- ── Layer 4: Domain Apps ── -->
  <rect x="40" y="580" width="680" height="70" rx="12" fill="white" filter="url(#shadow)"/>
  <rect x="40" y="580" width="5" height="70" rx="2" fill="url(#gGreen)"/>
  <text x="66" y="604" fill="#1e293b" font-size="14" font-weight="700">Domain App Layer</text>

  <rect x="260" y="592" width="120" height="28" rx="14" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
  <text x="320" y="610" text-anchor="middle" fill="#065f46" font-size="11" font-weight="600">schedules</text>
  <rect x="396" y="592" width="120" height="28" rx="14" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
  <text x="456" y="610" text-anchor="middle" fill="#065f46" font-size="11" font-weight="600">students</text>
  <rect x="532" y="592" width="120" height="28" rx="14" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
  <text x="592" y="610" text-anchor="middle" fill="#065f46" font-size="11" font-weight="600">payments</text>

  <!-- ═══════════════════ RIGHT PANEL: AI Features ═══════════════════ -->

  <!-- Feature 1: Scheduling Copilot -->
  <rect x="750" y="80" width="320" height="140" rx="12" fill="white" stroke="#c7d2fe" stroke-width="1" filter="url(#shadow)"/>
  <rect x="750" y="80" width="320" height="32" rx="12" fill="#3b82f6"/>
  <rect x="750" y="100" width="320" height="12" fill="#3b82f6"/>
  <text x="770" y="101" fill="white" font-size="12" font-weight="700">Natural Language Scheduling Copilot</text>
  <text x="770" y="130" fill="#1e293b" font-size="10" font-weight="600">"帮我约下周三下午3点小明的数学课"</text>
  <text x="770" y="146" fill="#64748b" font-size="9.5">Agent parses intent -> fuzzy match student -></text>
  <text x="770" y="160" fill="#64748b" font-size="9.5">check conflicts -> render HTMX confirm card</text>
  <rect x="762" y="172" width="60" height="18" rx="9" fill="#dbeafe"/>
  <text x="792" y="184" text-anchor="middle" fill="#1d4ed8" font-size="8" font-weight="600">SSE Stream</text>
  <rect x="828" y="172" width="54" height="18" rx="9" fill="#dbeafe"/>
  <text x="855" y="184" text-anchor="middle" fill="#1d4ed8" font-size="8" font-weight="600">Tool Use</text>
  <rect x="888" y="172" width="50" height="18" rx="9" fill="#dbeafe"/>
  <text x="913" y="184" text-anchor="middle" fill="#1d4ed8" font-size="8" font-weight="600">HTMX</text>
  <rect x="944" y="172" width="58" height="18" rx="9" fill="#dbeafe"/>
  <text x="973" y="184" text-anchor="middle" fill="#1d4ed8" font-size="8" font-weight="600">HITL Card</text>

  <!-- Feature 2: Payment Reminder -->
  <rect x="750" y="234" width="320" height="120" rx="12" fill="white" stroke="#c7d2fe" stroke-width="1" filter="url(#shadow)"/>
  <rect x="750" y="234" width="320" height="32" rx="12" fill="#8b5cf6"/>
  <rect x="750" y="254" width="320" height="12" fill="#8b5cf6"/>
  <text x="770" y="255" fill="white" font-size="12" font-weight="700">Smart Payment Reminder Advisor</text>
  <text x="770" y="284" fill="#64748b" font-size="9.5">Analyzes historical payment latency &amp; balance</text>
  <text x="770" y="298" fill="#64748b" font-size="9.5">Dynamically adjusts tone: Diplomatic / Professional / Direct</text>
  <rect x="762" y="310" width="80" height="18" rx="9" fill="#ede9fe"/>
  <text x="802" y="322" text-anchor="middle" fill="#6d28d9" font-size="8" font-weight="600">Relation-Aware</text>
  <rect x="848" y="310" width="78" height="18" rx="9" fill="#ede9fe"/>
  <text x="887" y="322" text-anchor="middle" fill="#6d28d9" font-size="8" font-weight="600">History-Based</text>

  <!-- Feature 3: Student Portrait -->
  <rect x="750" y="368" width="320" height="120" rx="12" fill="white" stroke="#c7d2fe" stroke-width="1" filter="url(#shadow)"/>
  <rect x="750" y="368" width="320" height="32" rx="12" fill="#10b981"/>
  <rect x="750" y="388" width="320" height="12" fill="#10b981"/>
  <text x="770" y="389" fill="white" font-size="12" font-weight="700">Student Dashboard AI Insights</text>
  <text x="770" y="418" fill="#64748b" font-size="9.5">Risk indicators: cancellation rate, payment delay, hours warning</text>
  <text x="770" y="432" fill="#64748b" font-size="9.5">AI student portrait from lesson notes via HTMX async loading</text>
  <rect x="762" y="444" width="64" height="18" rx="9" fill="#d1fae5"/>
  <text x="794" y="456" text-anchor="middle" fill="#065f46" font-size="8" font-weight="600">Risk Badges</text>
  <rect x="832" y="444" width="58" height="18" rx="9" fill="#d1fae5"/>
  <text x="861" y="456" text-anchor="middle" fill="#065f46" font-size="8" font-weight="600">HTMX Load</text>
  <rect x="896" y="444" width="56" height="18" rx="9" fill="#d1fae5"/>
  <text x="924" y="456" text-anchor="middle" fill="#065f46" font-size="8" font-weight="600">Pydantic</text>

  <!-- Feature 4: Feedback Generator -->
  <rect x="750" y="502" width="320" height="90" rx="12" fill="white" stroke="#c7d2fe" stroke-width="1" filter="url(#shadow)"/>
  <rect x="750" y="502" width="320" height="32" rx="12" fill="#f59e0b"/>
  <rect x="750" y="522" width="320" height="12" fill="#f59e0b"/>
  <text x="770" y="523" fill="white" font-size="12" font-weight="700">Structured Parent Feedback Generator</text>
  <text x="770" y="552" fill="#64748b" font-size="9.5">Pydantic-enforced JSON schema: skills, performance, drills, encouragement</text>
  <text x="770" y="566" fill="#64748b" font-size="9.5">3 tone presets: Encouraging / Analytical / Exam-Oriented</text>

  <!-- ═══════════════════ BOTTOM: Tech Stack ═══════════════════ -->
  <rect x="40" y="668" width="1030" height="36" rx="10" fill="#1e293b"/>
  <text x="550" y="691" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600" letter-spacing="0.5">Python  |  Django 5.1  |  Anthropic Claude 3.5 Sonnet  |  Prompt Caching  |  Tool Calling  |  SSE  |  HTMX  |  Pydantic  |  Tenacity  |  Pytest  |  Docker  |  PostgreSQL</text>
</svg>
